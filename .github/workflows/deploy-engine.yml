name: Deploy Engine to Railway

on:
  push:
    branches:
      - release
    paths:
      - "engine/**"
      - "requirements.txt"

jobs:
  deploy:
    name: Deploy to Railway via CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service "${{ secrets.RAILWAY_SERVICE_ID }}" --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
