name: Deploy Engine to Railway

on:
  push:
    branches:
      - release
    paths:
      - "engine/**"
      - "requirements.txt"

jobs:
  deploy:
    name: Trigger Railway Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway deploy hook
        run: |
          curl --fail -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_HEYAIRCON }}"
