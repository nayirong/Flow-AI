# HeyAircon Booking Flow Test Cases
# Owner: SDET Engineer | Reviewed by: Owner (pending)
# Purpose: Validates multi-step booking flow, calendar availability checks, policy enforcement

- test_name: "booking_partial_date_service_slot_missing_address"
  client_id: "hey-aircon"
  category: "multi_turn"
  priority: "high"
  conversation_history:
    - role: "user"
      content: "Book me for general servicing 30 April morning"
    - role: "assistant"
      content: "I'd be happy to help book your General Servicing for April 30th in the morning slot! To complete your booking, I'll need a couple more details."
  input_message: "How much more info do you need?"
  expected_intent: "booking_request"
  expected_tool: null
  expected_escalation: false
  expected_response_contains: ["address", "units"]
  reference_test: false
  tags: ["multi_turn", "booking", "partial_info"]
  enabled: true
  metadata:
    note: "Agent has date, service, slot — must ask for address and unit_count before booking"

