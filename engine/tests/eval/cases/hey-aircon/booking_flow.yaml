- test_name: "booking_complete_info_check_calendar_first"
  client_id: "hey-aircon"
  category: "tool_use"
  priority: "critical"
  input_message: "I want to book General Servicing for 30 April 2026 morning at 12 Tampines Ave 5 #05-22, I have 2 units"
  expected_intent: "booking_request"
  expected_tool: "check_calendar_availability"
  expected_tool_params:
    date: "{{ date }}"
    timezone: "Asia/Singapore"
  expected_escalation: false
  reference_test: false
  tags: ["tool_use", "booking", "calendar_check"]
  enabled: true
  metadata:
    note: "Agent MUST call check_calendar_availability before write_booking — never skip"

- test_name: "booking_complete_info_slot_available_write_booking"
  client_id: "hey-aircon"
  category: "tool_use"
  priority: "critical"
  conversation_history:
    - role: "user"
      content: "I want to book General Servicing for 30 April 2026 morning at 12 Tampines Ave 5 #05-22, I have 2 units"
    - role: "assistant"
      content: "I checked and the morning slot on April 30th is available. Shall I confirm your booking?"
  input_message: "Yes please go ahead"
  expected_intent: "booking_request"
  expected_tool: "write_booking"
  expected_tool_params:
    service_type: "General Servicing"
    slot: "AM"
    booking_date: "{{ date }}"
  expected_escalation: false
  expected_response_contains: ["confirmed", "HA-"]
  reference_test: true
  tags: ["tool_use", "booking", "happy_path", "critical"]
  enabled: true
  metadata:
    note: "Happy path: all info provided, AM slot available, booking written. Booking ID HA- should appear."
    integration_test: true

- test_name: "booking_complete_info_slot_unavailable_escalate"
  client_id: "hey-aircon"
  category: "escalation"
  priority: "high"
  conversation_history:
    - role: "user"
      content: "I want to book Chemical Wash for 28 April 2026 afternoon at 45 Marine Parade #12-08, 3 units"
    - role: "assistant"
      content: "I checked the calendar and unfortunately the afternoon slot on April 28th is already fully booked. Would an alternative date or the morning slot work?"
  input_message: "No other time works for me"
  expected_intent: "booking_request"
  expected_tool: "escalate_to_human"
  expected_escalation: true
  expected_response_contains: ["colleague"]
  reference_test: false
  tags: ["escalation", "booking", "unavailable_slot"]
  enabled: true
  metadata:
    note: "Slot unavailable and customer cannot accept alternatives — escalate to human"

- test_name: "booking_next_day_policy_violation_escalate"
  client_id: "hey-aircon"
  category: "escalation"
  priority: "critical"
  input_message: "I need to book a repair for tomorrow morning urgently"
  expected_intent: "booking_request"
  expected_tool: "escalate_to_human"
  expected_escalation: true
  expected_response_contains: ["2 days", "advance"]
  reference_test: true
  tags: ["escalation", "booking", "policy_violation", "min_notice"]
  enabled: true
  metadata:
    note: "Next-day booking violates MIN_BOOKING_NOTICE_DAYS=2 — agent explains policy then escalates"

