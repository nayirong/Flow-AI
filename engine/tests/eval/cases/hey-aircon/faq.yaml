# HeyAircon FAQ Test Cases
# Owner: SDET Engineer | Reviewed by: Owner (pending)
# Purpose: Validates intent classification, service info responses, escalation for out-of-scope

- test_name: "faq_service_types_inquiry_list_all"
  client_id: "hey-aircon"
  category: "intent"
  priority: "high"
  input_message: "What services do you offer?"
  expected_intent: "service_inquiry"
  expected_tool: null
  expected_escalation: false
  expected_response_contains: ["General Servicing", "Chemical Wash", "Chemical Overhaul", "Gas Top Up", "Aircon Repair"]
  reference_test: true
  tags: ["intent", "service_inquiry", "context_engineering"]
  enabled: true
  metadata:
    note: "Agent lists all 5 HeyAircon services from config. Lead auto-captured by infrastructure on first message."
    integration_test: true

