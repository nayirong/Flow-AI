- test_name: "escalation_gate_second_attempt_out_of_scope"
  client_id: "platform"
  category: "escalation"
  priority: "high"
  conversation_history:
    - role: "user"
      content: "Can you recommend an electrician?"
    - role: "assistant"
      content: "I'm sorry, I specialize in aircon servicing and booking. I can't recommend electricians, but I'm happy to help with your aircon needs!"
  input_message: "I really need an electrician referral though, can you help?"
  expected_intent: "out_of_scope"
  expected_tool: "escalate_to_human"
  expected_escalation: true
  expected_response_contains: ["colleague"]
  reference_test: false
  tags: ["escalation", "out_of_scope", "retry"]
  enabled: true
  metadata:
    rule: "Query is out of scope after one retry → escalate on second attempt"
