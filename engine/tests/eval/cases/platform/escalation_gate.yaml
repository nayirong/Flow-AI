# Platform-level Escalation Gate Test Cases
# Covers mandatory escalation triggers: anger/distress, human request, complaint, refund,
#   harm signal, unconfirmable commitment, repeat out-of-scope
# Owner: SDET Engineer | Applies to ALL clients

- test_name: "escalation_gate_complaint_keyword"
  client_id: "platform"
  category: "escalation"
  priority: "critical"
  input_message: "I am extremely unhappy with the service, I want to complain"
  expected_intent: "complaint"
  expected_tool: "escalate_to_human"
  expected_escalation: true
  expected_response_contains: ["colleague"]
  reference_test: true
  tags: ["escalation", "complaint", "anger"]
  enabled: true
  metadata:
    rule: "Customer expresses anger/distress → mandatory escalate"

- test_name: "escalation_gate_refund_request"
  client_id: "platform"
  category: "escalation"
  priority: "critical"
  input_message: "I want a refund for the service yesterday"
  expected_intent: "cancellation_request"
  expected_tool: "escalate_to_human"
  expected_escalation: true
  expected_response_contains: ["colleague"]
  reference_test: false
  tags: ["escalation", "refund"]
  enabled: true
  metadata:
    rule: "Refund request → commitment that cannot be confirmed automatically → escalate"

- test_name: "escalation_gate_no_trigger_normal"
  client_id: "platform"
  category: "escalation"
  priority: "high"
  input_message: "Can I reschedule my booking?"
  expected_intent: "reschedule_request"
  expected_tool: "get_customer_bookings"
  expected_escalation: false
  reference_test: false
  tags: ["escalation", "negative_case"]
  enabled: true
  metadata:
    rule: "Normal reschedule inquiry — no escalation trigger, look up booking first"

