# Platform-level Immediate Escalation Test Cases
# Covers capability-based immediate escalation: 6 unanswerable categories,
# tool-answerable questions, out-of-catalogue special case, prohibited phrases
# Owner: SDET Engineer | Applies to ALL clients

- test_name: "immediate_escalation_category_1_real_time_dispatch"
  client_id: "platform"
  category: "escalation"
  priority: "critical"
  input_message: "What time is the technician coming today?"
  expected_intent: "booking_inquiry"
  expected_tool: "escalate_to_human"
  expected_escalation: true
  expected_tool_params:
    reason: "{{ reason }}"
  expected_response_contains: ["don't have access to real-time dispatch", "team will reach out"]
  prohibited_response_contains: ["I'm not sure", "Let me check", "Let me find out", "I'll look into that"]
  reference_test: true
  tags: ["immediate_escalation", "category_1", "real_time_data"]
  enabled: true
  metadata:
    rule: "Category 1: Real-time operational data → escalate immediately"
    setup: "Customer with confirmed booking for today"
    escalation_reason_must_contain: ["real-time dispatch", "Category 1"]

