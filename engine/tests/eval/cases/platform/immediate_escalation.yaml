- test_name: "immediate_escalation_category_5_out_of_catalogue_lists_services_first"
  client_id: "hey-aircon"
  category: "escalation"
  priority: "high"
  input_message: "Do you repair refrigerators?"
  expected_intent: "service_inquiry"
  expected_tool: null
  expected_escalation: false
  expected_response_contains: ["aircon servicing", "don't currently service refrigerators"]
  reference_test: true
  tags: ["immediate_escalation", "category_5", "out_of_catalogue", "multi_step"]
  enabled: true
  metadata:
    rule: "Category 5 (special case): Out-of-catalogue services → list offered services first, do NOT escalate immediately"
    setup: "HeyAircon (aircon services only)"

- test_name: "immediate_escalation_category_5_out_of_catalogue_escalates_after_persist"
  client_id: "hey-aircon"
  category: "escalation"
  priority: "high"
  input_message: "No, I need a fridge repair."
  expected_intent: "service_inquiry"
  expected_tool: "escalate_to_human"
  expected_escalation: true
  expected_tool_params:
    reason: "{{ reason }}"
  expected_response_contains: ["I understand", "team will reach out"]
  reference_test: false
  tags: ["immediate_escalation", "category_5", "out_of_catalogue", "multi_step"]
  enabled: true
  metadata:
    rule: "Category 5 (follow-up): Customer persists with out-of-catalogue → escalate now"
    setup: "Follow-up to test_immediate_escalation_category_5_out_of_catalogue_lists_services_first"
    escalation_reason_must_contain: ["refrigerator", "not in service catalogue", "Category 5"]

