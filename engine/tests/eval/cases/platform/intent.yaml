# Platform-level Intent Classification Test Cases
# Covers: all core intents that every Flow AI client agent must correctly classify
# Owner: SDET Engineer | Applies to ALL clients

- test_name: "intent_greeting"
  client_id: "platform"
  category: "intent"
  priority: "low"
  input_message: "Hi there!"
  expected_intent: "greeting"
  expected_tool: null
  expected_escalation: false
  expected_response_contains: ["help"]
  reference_test: false
  tags: ["intent", "greeting"]
  enabled: true
  metadata:
    note: "Simple greeting — agent should introduce and offer to help"

- test_name: "intent_booking_request_explicit"
  client_id: "platform"
  category: "intent"
  priority: "high"
  input_message: "I want to book a service"
  expected_intent: "booking_request"
  expected_tool: null
  expected_escalation: false
  reference_test: false
  tags: ["intent", "booking"]
  enabled: true
  metadata:
    note: "Explicit booking intent — agent asks for details (no tool until info collected)"

