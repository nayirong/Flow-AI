  expected_response_contains: ["colleague"]
  reference_test: false
  tags: ["intent", "cancellation"]
  enabled: true
  metadata:
    note: "Cancellation intent — Phase 1: always escalate to human"

- test_name: "intent_complaint"
  client_id: "platform"
  category: "intent"
  priority: "critical"
  input_message: "This is the second time your technician has been late. I'm not happy."
  expected_intent: "complaint"
  expected_tool: "escalate_to_human"
  expected_escalation: true
  expected_response_contains: ["colleague"]
  reference_test: false
  tags: ["intent", "complaint", "escalation"]
  enabled: true
  metadata:
    note: "Complaint intent — agent empathizes briefly, escalates immediately"

- test_name: "intent_out_of_scope"
  client_id: "platform"
  category: "intent"
  priority: "high"
  input_message: "What's the best aircon brand to buy?"
  expected_intent: "out_of_scope"
  expected_tool: "escalate_to_human"
  expected_escalation: true
  expected_response_excludes: ["I recommend", "brand", "buy"]
  reference_test: false
  tags: ["intent", "out_of_scope"]
  enabled: true
  metadata:
    note: "Out of scope — agent stays in servicing scope, escalates for purchasing advice"

- test_name: "intent_booking_ambiguous_no_tool"
  client_id: "platform"
